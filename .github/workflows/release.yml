---
# SPDX-License-Identifier: MIT OR Apache-2.0
name: Release

"on":
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  # id-token: write   # enable if using OIDC

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo.toml version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(
            grep -E '^version = ' Cargo.toml \
              | sed -E 's/.*"([^"]+)".*/\1/'
          )"
          if [ "$FILE_VERSION" != "$TAG" ]; then
            echo "Tag v$TAG != Cargo.toml version $FILE_VERSION"
            exit 1
          fi
          echo "Version check OK: $FILE_VERSION"

      - name: Build & install liboqs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build cmake pkg-config libssl-dev
          git clone --depth 1 \
            https://github.com/open-quantum-safe/liboqs
          cd liboqs && mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOQS_DIST_BUILD=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="$HOME/.local/liboqs" ..
          ninja
          ninja install
          export PKG_CONFIG_PATH="$HOME/.local/liboqs/lib/pkgconfig"
          pkg-config --modversion liboqs

      - name: Publish to crates.io
        env:
          LIBOQS_DIR: ${{ runner.home }}/.local/liboqs
          PKG_CONFIG_PATH: >
            ${{ runner.home }}/.local/liboqs/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ runner.home }}/.local/liboqs/lib
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify
